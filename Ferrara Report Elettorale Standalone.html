document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n; padding: 56px 72px; box-sizing: border-box; position: relative; overflow: hidden;\"\u003e\n  \u003c!-- Geometric accent top-right inspired by IZI logo shape --\u003e\n  \u003cdiv style=\"position: absolute; top: 0; right: 0; width: 260px; height: 260px; background: #1E5AE8; opacity: 0.09; transform: rotate(45deg) translate(50%, -50%); border-radius: 32px; pointer-events: none;\"\u003e\u003c/div\u003e\n  \u003cdiv style=\"position: absolute; bottom: 60px; right: 72px; width: 120px; height: 120px; background: #F4B740; opacity: 0.08; transform: rotate(45deg); border-radius: 16px; pointer-events: none;\"\u003e\u003c/div\u003e\n\n  \u003c!-- Logo --\u003e\n  \u003cimg src=\"f13491b3-e6d6-422f-bd65-13a130cfb7dc\" style=\"height: 42px; width: auto; display: block; object-fit: contain; object-position: left center; flex-shrink: 0;\"\u003e\n\n  \u003cdiv style=\"flex: 1; min-height: 80px;\"\u003e\u003c/div\u003e\n\n  \u003c!-- Title block --\u003e\n  \u003cdiv style=\"max-width: 660px;\"\u003e\n    \u003cdiv style=\"display: flex; align-items: center; gap: 12px; margin-bottom: 28px;\"\u003e\n      \u003cdiv style=\"width: 32px; height: 3px; background: #1E5AE8; border-radius: 2px; flex-shrink: 0;\"\u003e\u003c/div\u003e\n      \u003cspan style=\"font-size: 11px; font-weight: 600; color: #6B8DC4; text-transform: uppercase; letter-spacing: 0.15em;\"\u003eReport di ricerca\u003c/span\u003e\n    \u003c/div\u003e\n    \u003ch1 style=\"font-size: 44px; font-weight: 700; color: #FFFFFF; line-height: 1.13; margin: 0 0 18px; letter-spacing: -0.01em;\"\u003eListe Civiche\u003cbr\u003ee Partecipazione\u003cbr\u003eElettorale\u003c/h1\u003e\n    \u003cp style=\"font-size: 21px; font-weight: 300; color: #8AABDA; margin: 0 0 36px; line-height: 1.35;\"\u003eFerrara nel contesto nazionale\u003c/p\u003e\n    \u003cdiv style=\"width: 100%; height: 1px; background: #243954; margin-bottom: 32px;\"\u003e\u003c/div\u003e\n    \u003cdiv style=\"display: flex; flex-wrap: wrap; gap: 36px;\"\u003e\n      \u003cdiv\u003e\n        \u003cdiv style=\"font-size: 10px; font-weight: 600; color: #4A6585; text-transform: uppercase; letter-spacing: 0.13em; margin-bottom: 4px;\"\u003ePeriodo\u003c/div\u003e\n        \u003cdiv style=\"font-size: 15px; color: #B8CCF6;\"\u003eTornate comunali 2021–2025\u003c/div\u003e\n      \u003c/div\u003e\n      \u003cdiv\u003e\n        \u003cdiv style=\"font-size: 10px; font-weight: 600; color: #4A6585; text-transform: uppercase; letter-spacing: 0.13em; margin-bottom: 4px;\"\u003eDataset\u003c/div\u003e\n        \u003cdiv style=\"font-size: 15px; color: #B8CCF6;\"\u003e5.459 comuni · 5.455 osservazioni\u003c/div\u003e\n      \u003c/div\u003e\n      \u003cdiv\u003e\n        \u003cdiv style=\"font-size: 10px; font-weight: 600; color: #4A6585; text-transform: uppercase; letter-spacing: 0.13em; margin-bottom: 4px;\"\u003eData analisi\u003c/div\u003e\n        \u003cdiv style=\"font-size: 15px; color: #B8CCF6;\"\u003eGiugno 2026\u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/div\u003e\n\n  \u003cdiv style=\"margin-top: 52px; font-size: 12px; color: #2D4460; line-height: 1.6;\"\u003e\n    Fonti: Ministero dell\u0027Interno — Classificazione: tassonomia a 3 livelli LCF (Zonari, 2024) — Script: analisi_parti_lcf.py\n  \u003c/div\u003e\n\u003c/div\u003e\n\n\u003c!-- ═══════════════════ BODY ═══════════════════ --\u003e\n\u003cmain class=\"doc\"\u003e\n  \u003ctable class=\"doc-frame\" role=\"presentation\"\u003e\n    \u003cthead\u003e\u003ctr\u003e\u003ctd class=\"hdr-space\"\u003e\u003c/td\u003e\u003c/tr\u003e\u003c/thead\u003e\n    \u003ctbody\u003e\u003ctr\u003e\u003ctd\u003e\n\n    \u003c!-- ─── 4 KPI TILES ─── --\u003e\n    \u003cdiv class=\"nb\" style=\"display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 52px; padding-top: 4px;\"\u003e\n      \u003cdiv style=\"background: #fff; border: 1px solid var(--bd); border-radius: 12px; padding: 18px 16px; border-top: 3px solid var(--p);\"\u003e\n        \u003cdiv style=\"font-size: 30px; font-weight: 700; color: var(--p); line-height: 1; margin-bottom: 6px;\"\u003e+0,788\u003c/div\u003e\n        \u003cdiv style=\"font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px;\"\u003eCorrelazione EU/Comunali\u003c/div\u003e\n        \u003cdiv style=\"font-size: 12px; color: var(--muted2); line-height: 1.45;\"\u003eConcomitanza europee 2024 spiega il 66% della varianza\u003c/div\u003e\n      \u003c/div\u003e\n      \u003cdiv style=\"background: #fff; border: 1px solid var(--bd); border-radius: 12px; padding: 18px 16px; border-top: 3px solid var(--grn);\"\u003e\n        \u003cdiv style=\"font-size: 30px; font-weight: 700; color: var(--grn); line-height: 1; margin-bottom: 6px;\"\u003e+0,284\u003c/div\u003e\n        \u003cdiv style=\"font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px;\"\u003epp per civica · Panel FE\u003c/div\u003e\n        \u003cdiv style=\"font-size: 12px; color: var(--muted2); line-height: 1.45;\"\u003eEffetto causale stimato (p=0,002) su 100 comuni, 2 tornate ciascuno\u003c/div\u003e\n      \u003c/div\u003e\n      \u003cdiv style=\"background: #fff; border: 1px solid var(--bd); border-radius: 12px; padding: 18px 16px; border-top: 3px solid var(--p);\"\u003e\n        \u003cdiv style=\"font-size: 30px; font-weight: 700; color: var(--p); line-height: 1; margin-bottom: 6px;\"\u003e+0,568\u003c/div\u003e\n        \u003cdiv style=\"font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px;\"\u003er Civiche collegate\u003c/div\u003e\n        \u003cdiv style=\"font-size: 12px; color: var(--muted2); line-height: 1.45;\"\u003eLe civiche di coalizione correlano più delle autonome (r=+0,193)\u003c/div\u003e\n      \u003c/div\u003e\n      \u003cdiv style=\"background: #fff; border: 1px solid var(--bd); border-radius: 12px; padding: 18px 16px; border-top: 3px solid var(--acc);\"\u003e\n        \u003cdiv style=\"font-size: 30px; font-weight: 700; color: #A07800; line-height: 1; margin-bottom: 6px;\"\u003e2,097\u003c/div\u003e\n        \u003cdiv style=\"font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px;\"\u003eβ Densità civ./cand. OLS\u003c/div\u003e\n        \u003cdiv style=\"font-size: 12px; color: var(--muted2); line-height: 1.45;\"\u003ePredittore 10× più forte del semplice volume di civiche\u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n\n    \u003c!-- ─── SEZIONE 01 ─── --\u003e\n    \u003cdiv style=\"margin-bottom: 52px;\"\u003e\n      \u003cdiv style=\"font-size: 10px; font-weight: 600; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.16em; margin-bottom: 6px;\"\u003e01\u003c/div\u003e\n      \u003ch2 style=\"font-size: 26px; font-weight: 700; color: var(--ink); margin: 0 0 18px; line-height: 1.2;\"\u003eLa domanda di ricerca\u003c/h2\u003e\n      \u003cp style=\"font-size: 15px; color: var(--ink2); line-height: 1.65; margin: 0 0 14px;\"\u003eLa presenza di liste civiche aumenta la partecipazione elettorale nelle città medie come Ferrara? Non le liste in senso generico, ma specificamente le \u003cstrong\u003eliste civiche\u003c/strong\u003e: quelle espressioni di cittadinanza organizzata che nascono dal territorio, fuori dalla logica dei partiti nazionali.\u003c/p\u003e\n      \u003cp style=\"font-size: 15px; color: var(--ink2); line-height: 1.65; margin: 0 0 20px;\"\u003eL\u0027analisi verifica l\u0027ipotesi su comuni comparabili a Ferrara per dimensione (70.000–160.000 elettori), confrontando le tornate 2021, 2023, 2024 e 2025 su un dataset di \u003cstrong\u003e5.560 osservazioni in 5.459 comuni\u003c/strong\u003e. L\u0027analisi risponde alle tre domande del dossier LCF (Zonari, 2024): peso delle tipologie di civiche (Parte I), ruolo del numero di candidati sindaco (Parte II), importanza della densità delle reti (Parte III).\u003c/p\u003e\n\n      \u003cdiv class=\"nb\" style=\"background: var(--surf); border: 1px solid var(--bd); border-radius: 10px; padding: 18px 20px;\"\u003e\n        \u003cdiv style=\"font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 12px;\"\u003eNota metodologica — Tassonomia a tre livelli\u003c/div\u003e\n        \u003cdiv style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;\"\u003e\n          \u003cdiv style=\"background: #fff; border: 1px solid var(--bd); border-radius: 8px; padding: 12px 14px;\"\u003e\n            \u003cdiv style=\"font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 5px;\"\u003eListe di partito\u003c/div\u003e\n            \u003cdiv style=\"font-size: 12px; color: var(--muted2); line-height: 1.45;\"\u003ePD, FdI, Lega, FI, M5S, Azione, IV, AVS, PSI, UdC e altri simboli nazionali\u003c/div\u003e\n          \u003c/div\u003e\n          \u003cdiv style=\"background: var(--p1); border: 1px solid var(--p2); border-radius: 8px; padding: 12px 14px;\"\u003e\n            \u003cdiv style=\"font-size: 12px; font-weight: 600; color: var(--p); margin-bottom: 5px;\"\u003eCiviche collegate\u003c/div\u003e\n            \u003cdiv style=\"font-size: 12px; color: var(--ink2); line-height: 1.45;\"\u003eListe civiche il cui candidato è sostenuto anche da liste di partito\u003c/div\u003e\n          \u003c/div\u003e\n          \u003cdiv style=\"background: var(--acc-t); border: 1px solid #EDDB9A; border-radius: 8px; padding: 12px 14px;\"\u003e\n            \u003cdiv style=\"font-size: 12px; font-weight: 600; color: #A07800; margin-bottom: 5px;\"\u003eCiviche autonome\u003c/div\u003e\n            \u003cdiv style=\"font-size: 12px; color: #5C4A00; line-height: 1.45;\"\u003eListe civiche il cui candidato non ha alcun supporto di partito formale\u003c/div\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n\n    \u003c!-- ─── SEZIONE 02 ─── --\u003e\n    \u003cdiv style=\"margin-bottom: 52px;\"\u003e\n      \u003cdiv style=\"font-size: 10px; font-weight: 600; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.16em; margin-bottom: 6px;\"\u003e02\u003c/div\u003e\n      \u003ch2 style=\"font-size: 26px; font-weight: 700; color: var(--ink); margin: 0 0 18px; line-height: 1.2;\"\u003eLa variabile di contesto: il giugno 2024 e le elezioni europee\u003c/h2\u003e\n      \u003cp style=\"font-size: 15px; color: var(--ink2); line-height: 1.65; margin: 0 0 20px;\"\u003eIl 9 giugno 2024 i comuni al voto hanno svolto le comunali in contemporanea con le elezioni europee. Questo meccanismo produce un \u003cstrong\u003eeffetto di traino\u003c/strong\u003e documentato: chi apre la scheda delle europee compila anche quella del sindaco. Nei comuni di dimensione comparabile a Ferrara, l\u0027affluenza media è stata del \u003cstrong\u003e61,8% nel 2024\u003c/strong\u003e, contro il 56–57% delle tornate senza europee: circa cinque-sei punti in più riconducibili alla doppia scheda.\u003c/p\u003e\n\n      \u003cdiv class=\"nb\" style=\"background: var(--p1); border-left: 4px solid var(--p); border-radius: 0 10px 10px 0; padding: 20px 24px; margin-bottom: 24px;\"\u003e\n        \u003cdiv style=\"display: flex; align-items: flex-start; gap: 20px; flex-wrap: wrap;\"\u003e\n          \u003cdiv style=\"flex-shrink: 0;\"\u003e\n            \u003cdiv style=\"font-size: 48px; font-weight: 700; color: var(--p); line-height: 1;\"\u003er = +0,788\u003c/div\u003e\n            \u003cdiv style=\"font-size: 12px; color: #3B6ADD; font-weight: 600; margin-top: 4px;\"\u003eCorrelazione EU/comunali · 9 giugno 2024 · N = 3.547 comuni\u003c/div\u003e\n          \u003c/div\u003e\n          \u003cdiv style=\"flex: 1; min-width: 200px; font-size: 14px; color: var(--ink2); line-height: 1.65; padding-top: 6px;\"\u003e\n            Un legame così stretto da spiegare, da solo, il \u003cstrong\u003e66% della varianza\u003c/strong\u003e nell\u0027affluenza comunale. Quando si aggiunge il numero di liste come variabile esplicativa, il suo contributo risulta statisticamente nullo (β = −0,041, p = 0,296). La concomitanza assorbe tutto.\n          \u003c/div\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n\n      \u003cdiv class=\"nb\"\u003e\n        \u003cdiv style=\"font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px;\"\u003eTornate comunali — fascia 70.000–160.000 elettori\u003c/div\u003e\n        \u003ctable style=\"width: 100%; border-collapse: collapse; font-size: 14px;\"\u003e\n          \u003cthead\u003e\n            \u003ctr\u003e\n              \u003cth style=\"background: var(--p1); color: var(--p); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; padding: 10px 14px; text-align: left; border-bottom: 2px solid var(--p);\"\u003eTornata\u003c/th\u003e\n              \u003cth style=\"background: var(--p1); color: var(--p); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; padding: 10px 14px; text-align: center; border-bottom: 2px solid var(--p);\"\u003eN comuni\u003c/th\u003e\n              \u003cth style=\"background: var(--p1); color: var(--p); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; padding: 10px 14px; text-align: center; border-bottom: 2px solid var(--p);\"\u003eAffluenza media\u003c/th\u003e\n              \u003cth style=\"background: var(--p1); color: var(--p); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; padding: 10px 14px; text-align: center; border-bottom: 2px solid var(--p);\"\u003eConcomitanza europee\u003c/th\u003e\n            \u003c/tr\u003e\n          \u003c/thead\u003e\n          \u003ctbody\u003e\n            \u003ctr style=\"backgrou ato (voto plebiscitario), il campione utile è di \u003cstrong\u003e5.455 osservazioni\u003c/strong\u003e, di cui 1.638 in tornate senza concomitanza europea.\u003c/p\u003e\n      \u003cdiv class=\"nb\" style=\"display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;\"\u003e\n        \u003cdiv style=\"background: var(--surf); border: 1px solid var(--bd); border-radius: 10px; padding: 16px; text-align: center;\"\u003e\n          \u003cdiv style=\"font-size: 26px; font-weight: 700; color: var(--p); line-height: 1; margin-bottom: 4px;\"\u003e1.153\u003c/div\u003e\n          \u003cdiv style=\"font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.09em;\"\u003eComuni 2021\u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv style=\"background: var(--surf); border: 1px solid var(--bd); border-radius: 10px; padding: 16px; text-align: center;\"\u003e\n          \u003cdiv style=\"font-size: 26px; font-weight: 700; color: var(--p); line-height: 1; margin-bottom: 4px;\"\u003e639\u003c/div\u003e\n          \u003cdiv style=\"font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.09em;\"\u003eComuni 2023\u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv style=\"background: var(--p1); border: 1px solid var(--p2); border-radius: 10px; padding: 16px; text-align: center;\"\u003e\n          \u003cdiv style=\"font-size: 26px; font-weight: 700; color: var(--p); line-height: 1; margin-bottom: 4px;\"\u003e3.546\u003c/div\u003e\n          \u003cdiv style=\"font-size: 11px; font-weight: 600; color: var(--p); text-transform: uppercase; letter-spacing: 0.09em;\"\u003eComuni 2024 ★\u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv style=\"background: var(--surf); border: 1px solid var(--bd); border-radius: 10px; padding: 16px; text-align: center;\"\u003e\n          \u003cdiv style=\"font-size: 26px; font-weight: 700; color: var(--p); line-height: 1; margin-bottom: 4px;\"\u003e117\u003c/div\u003e\n          \u003cdiv style=\"font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.09em;\"\u003eComuni 2025\u003c/div\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n      \u003cdiv style=\"font-size: 12px; color: var(--muted2); margin-top: 8px; font-style: italic;\"\u003e★ 2024 include la concomitanza con le elezioni europee.\u003c/div\u003e\n      \u003cp style=\"font-size: 14px; color: var(--ink2); line-height: 1.65; margin: 16px 0 0; background: var(--surf); border-radius: 8px; padding: 14px 16px; border: 1px solid var(--bd);\"\u003eDistribuzione media del pluralismo civico per comune: \u003cstrong\u003e0,7–1,6 liste di partito\u003c/strong\u003e, \u003cstrong\u003e0,3–1,7 civiche collegate\u003c/strong\u003e, \u003cstrong\u003e2,2–3,5 civiche autonome\u003c/strong\u003e. Le civiche autonome sono strutturalmente la categoria più numerosa — nei piccoli comuni quasi tutte le liste sono autonome per definizione.\u003c/p\u003e\n    \u003c/div\u003e\n\n    \u003c!-- ─── SEZIONE 06 ─── --\u003e\n    \u003cdiv style=\"margin-bottom: 52px;\"\u003e\n      \u003cdiv style=\"font-size: 10px; font-weight: 600; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.16em; margin-bottom: 6px;\"\u003e06\u003c/div\u003e\n      \u003ch2 style=\"font-size: 26px; font-weight: 700; color: var(--ink); margin: 0 0 18px; line-height: 1.2;\"\u003eLe tornate senza europee: correlazioni nel campione esteso\u003c/h2\u003e\n      \u003cp style=\"font-size: 15px; color: var(--ink2); line-height: 1.65; margin: 0 0 20px;\"\u003eLa risposta più solida emerge dalle tornate 2021, 2023 e 2025, dove non c\u0027è la concomitanza europea (N = 1.638 comuni con almeno due liste). Nella fascia tipo-Ferrara (50.000–200.000 elettori, N = 32), la correlazione complessiva delle civiche con l\u0027affluenza è \u003cstrong\u003er = +0,503\u003c/strong\u003e, IC 95% [+0,19, +0,81].\u003c/p\u003e\n\n      \u003cdiv -bottom: 1px solid var(--bd);\"\u003e+ area geografica\u003c/td\u003e\n              \u003ctd style=\"padding: 9px 12px; color: var(--muted); border-bottom: 1px solid var(--bd); font-size: 12px;\"\u003e+ Nord/Centro/Sud\u003c/td\u003e\n              \u003ctd style=\"padding: 9px 12px; text-align: center; border-bottom: 1px solid var(--bd); font-weight: 600; color: var(--muted);\"\u003e+0,124\u003c/td\u003e\n              \u003ctd style=\"padding: 9px 12px; text-align: center; border-bottom: 1px solid var(--bd); color: var(--muted);\"\u003e+1,50\u003c/td\u003e\n              \u003ctd style=\"padding: 9px 12px; text-align: center; border-bottom: 1px solid var(--bd); color: var(--muted2);\"\u003e—\u003c/td\u003e\n            \u003c/tr\u003e\n            \u003ctr style=\"background: #fff;\"\u003e\n              \u003ctd style=\"padding: 9px 12px; color: var(--ink2);\"\u003e+ liste di partito\u003c/td\u003e\n              \u003ctd style=\"padding: 9px 12px; color: var(--muted); font-size: 12px;\"\u003e+ n_partito, area, anno\u003c/td\u003e\n              \u003ctd style=\"padding: 9px 12px; text-align: center; font-weight: 700; color: var(--p);\"\u003e+0,274\u003c/td\u003e\n              \u003ctd style=\"padding: 9px 12px; text-align: center; color: var(--ink2);\"\u003e+2,73\u003c/td\u003e\n              \u003ctd style=\"padding: 9px 12px; text-align: center;\"\u003e\u003cspan style=\"background: var(--grn-t); color: var(--grn); font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 999px;\"\u003e*\u003c/span\u003e\u003c/td\u003e\n            \u003c/tr\u003e\n          \u003c/tbody\u003e\n        \u003c/table\u003e\n        \u003cdiv style=\"font-size: 11px; color: var(--muted2); margin-top: 6px; font-style: italic;\"\u003eN=1.638 (comuni ≥2 liste, tornate 2021+2023+2025). * p\u0026lt;0,05. Errori standard robusti HC0.\u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n\n    \u003c!-- ─── SEZIONE 07 ─── --\u003e\n    \u003cdiv style=\"margin-botto ultato contro-intuitivo\u003c/div\u003e\n        \u003cdiv style=\"font-size: 14px; color: #5C1A14; line-height: 1.6;\"\u003eOgni candidato in più è associato, in media, a \u003cstrong\u003e−0,4 pp di affluenza\u003c/strong\u003e (β = −0,386, t = −2,08, controllato per dimensione del comune). Quando si aggiunge il numero di civiche, l\u0027effetto dei candidati aggiuntivi è ancora più negativo (β = −1,256, t = −5,05). Il numero di candidature cattura più la \u003cem\u003eframmentazione\u003c/em\u003e che il pluralismo reale.\u003c/div\u003e\n      \u003c/div\u003e\n\n      \u003cdiv class=\"nb\"\u003e\n        \u003ctable style=\"width: 100%; border-collapse: collapse; font-size: 13px;\"\u003e\n          \u003cthead\u003e\n            \u003ctr\u003e\n              \u003cth style=\"background: var(--p1); color: var(--p); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; padding: 9px 12px; text-align: left; border-bottom: 2px solid var(--p);\"\u003eModello\u003c/th\u003e\n              \u003cth style=\"background: var(--p1); color: var(--p); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; padding: 9px 12px; text-align: center; border-bottom: 2px solid var(--p);\"\u003eβ (n_candidati)\u003c/th\u003e\n              \u003cth style=\"background: var(--p1); color: var(--p); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; padding: 9px 12px; text-align: center; border-bottom: 2px solid var(--p);\"\u003et\u003c/th\u003e\n              \u003cth style=\"background: var(--p1); color: var(--p); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; padding: 9px 12px; text-align: left; border-bottom: 2px solid var(--p);\"\u003eNota\u003c/th\u003e\n            \u003c/tr\u003e\n          \u003c/thead\u003e\n          \u003ctbody\u003e\n            \u003ctr style=\"background: var(--surf);\"\u003e\u003ctd style=\"padding: 9px 12px; color: var(  style=\"padding: 8px 12px; text-align: center; border-bottom: 1px solid var(--bd); color: var(--p); font-weight: 600;\"\u003e24\u003c/td\u003e\u003ctd style=\"padding: 8px 12px; text-align: center; border-bottom: 1px solid var(--bd); font-weight: 700; color: var(--acc); font-size: 15px;\"\u003e3,4\u003c/td\u003e\u003c/tr\u003e\n            \u003ctr style=\"background: var(--surf);\"\u003e\u003ctd style=\"padding: 8px 12px; color: var(--ink2); border-bottom: 1px solid var(--bd);\"\u003eAprilia\u003c/td\u003e\u003ctd style=\"padding: 8px 12px; text-align: center; border-bottom: 1px solid var(--bd); color: var(--muted);\"\u003e2023\u003c/td\u003e\u003ctd style=\"padding: 8px 12px; text-align: center; border-bottom: 1px solid var(--bd); font-weight: 600;\"\u003e53,2%\u003c/td\u003e\u003ctd style=\"padding: 8px 12px; text-align: center; border-bottom: 1px solid var(--bd); color: var(--muted);\"\u003e5\u003c/td\u003e\u003ctd style=\"padding: 8px 12px; text-align: center; border-bottom: 1px solid var(--bd); color: var(--p); font-weight: 600;\"\u003e16\u003c/td\u003e\u003ctd style=\"padding: 8px 12px; text-align: center; border-bottom: 1px solid var(--bd); font-weight: 700; color: #A07800; font-size: 15px;\"\u003e3,2\u003c/td\u003e\u003c/tr\u003e\n            \u003ctr style=\"background: var(--p2);\"\u003e\u003ctd style=\"padding: 8px 12px; color: var(--ink); font-weight: 700; border-bottom: 1px solid var(--p3);\"\u003eFerrara ★\u003c/td\u003e\u003ctd style=\"padding: 8px 12px; text-align: center; border-bottom: 1px solid var(--p3); color: var(--muted);\"\u003e2024\u003c/td\u003e\u003ctd style=\"padding: 8px 12px; text-align: center; border-bottom: 1px solid var(--p3); font-weight: 700; color: var(--p);\"\u003e67,6%\u003c/td\u003e\u003ctd style=\"padding: 8px 12px; text-align: center; border-bottom: 1px solid var(--p3); color: var(--muted);\"\u003e4\u003c/td\u003e\u003ctd style=\"padding: 8px 12px; text-align: center; border-bottom: 1px solid var(--p3); color: var(--p); font-weight: 700;\"\u003e6\u003c/td\u003e\u003ctd style=\"padding: 8px 12px; text-align: center; font-weight: 700; color: var(--p); font-size: 15px;\"\u003e1,5\u003c/td\u003e\u003c/tr\u003e\n          \u003c/tbody\u003e\n        \u003c/table\u003e\n        \u003cdiv style=\"font-size: 11px; color: var(--muted2); margin-top: 6px; font-style: italic;\"\u003e★ Ferrara 2024: densità 1,5 — al di sotto della media del gruppo (2,5) ma con offerta organizzata. Secondo il modello OLS, contribuisce per circa +3,1 pp rispetto a un comune con densità 0.\u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n\n    \u003c!-- ─── SEZIONE 12 ─── --\u003e\n    \u003cdiv style=\"margin-bottom: 52px;\"\u003e\n      \u003cdiv style=\"font-size: 10px; font-weight: 600; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.16em; margin-bottom: 6px;\"\u003e12\u003c/div\u003e\n      \u003ch2 style=\"font-size: 26px; font-weight: 700; color: var(--ink); margin: 0 0 18px; line-height: 1.2;\"\u003eFerrara nel contesto: il ruolo delle civiche e degli altri fattori\u003c/h2\u003e\n      \u003cp style=\"font-size: 15px; color: var(--ink2); line-height: 1.65; margin: 0 0 20px;\"\u003eCon 6 liste civiche, 4 candidati e densità 1,5 civiche/candidato, Ferrara si posiziona nella \u003cstrong\u003efascia mediana\u003c/strong\u003e del suo gruppo per pluralismo civico organizzato. Il modello stima un contributo delle civiche di circa +1,7–2,0 pp — non sufficiente, da solo, a spiegare il vantaggio di 5,8 punti sulla media del gruppo 2024. Tre fattori concorrono a completare il quadro.\u003c/p\u003e\n\n      \u003cdiv class=\"nb\" style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;\"\u003e\n        \u003cdiv style=\"background: #fff; border: 1px solid var(--bd); border-radius: 12px; padding: 20px;\"\u003e\n          \u003cdiv style=\"width: 32px; height: 32px; background: var(--p1); border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px;\"\u003e\n            \u003cdiv style=\"font-size: 16px; font-weight: 700; color: var(--p);\"\u003e1\u003c/div\u003e\n          \u003c/div\u003e\n          \u003cdiv style=\"font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 8px;\"\u003eTradizione civica emiliana\u003c/div\u003e\n          \u003cdiv style=\"font-size: 13px; color: var(--ink2); line-height: 1.55;\"\u003eL\u0027Emilia-Romagna registra storicamente i più alti tassi di partecipazione in Italia. Cesena, Modena, Reggio e Forlì si collocano tutte nella fascia alta del gruppo 2024 indipendentemente dalla densità civica.\u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv style=\"background: #fff; border: 1px solid var(--bd); border-radius: 12px; padding: 20px;\"\u003e\n          \u003cdiv style=\"width: 32px; height: 32px; background: var(--p1); border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px;\"\u003e\n            \u003cdiv style=\"font-size: 16px; font-weight: 700; color: var(--p);\"\u003e2\u003c/div\u003e\n          \u003c/div\u003e\n          \u003cdiv style=\"font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 8px;\"\u003eCompetitività percepita\u003c/div\u003e\n          \u003cdiv style=\"font-size: 13px; color: var(--ink2); line-height: 1.55;\"\u003eQuattro candidati, sfida aperta tra sindaco uscente e coalizione rinnovata. Il senso che il risultato potesse cambiare con ogni voto è storicamente il principale motore di partecipazione aggiuntiva.\u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv style=\"background: #fff; border: 1px solid var(--bd); border-radius: 12px; padding: 20px;\"\u003e\n          \u003cdiv style=\"width: 32px; height: 32px; background: var(--p1); border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px;\"\u003e\n            \u003cdiv style=\"font-size: 16px; font-weight: 700; color: var(--p);\"\u003e3\u003c/div\u003e\n          \u003c/div\u003e\n          \u003cdiv style=\"font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 8px;\"\u003eQualità delle civiche collegate\u003c/div\u003e\n          \u003cdiv style=\"font-size: 13px; color: var(--ink2); line-height: 1.55;\"\u003eLe civiche ferraresi — Fabbri Sindaco, Anselmo Sindaco, La Comune, Ferrara al Centro, Sinistra Unita — sono liste con radicamento associativo reale, non semplici contenitori nominali. Ferrara beneficia probabilmente di un moltiplicatore superiore alla media nazionale.\u003c/div\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n\n    \u003c!-- ─── SEZIONE 13 — CONCLUSIONI ─── --\u003e\n    \u003cdiv style=\"background: #0F1F36; border-radius: 16px; padding: 40px 44px; margin-bottom: 48px;\"\u003e\n      \u003cdiv style=\"font-size: 10px; font-weight: 600; color: #6B8DC4; text-transform: uppercase; letter-spacing: 0.16em; margin-bottom: 8px;\"\u003e13 — Conclusioni\u003c/div\u003e\n      \u003ch2 style=\"font-size: 26px; font-weight: 700; color: #FFFFFF; margin: 0 0 28px; line-height: 1.2;\"\u003eTre risposte empiriche alle domande del dossier LCF\u003c/h2\u003e\n\n      \u003cdiv style=\"display: flex; flex-direction: column; gap: 20px;\"\u003e\n        \u003c!-- Parte I --\u003e\n        \u003cdiv style=\"background: rgba(255,255,255,0.06); border-radius: 10px; padding: 18px 22px; border-left: 3px solid #1E5AE8;\"\u003e\n          \u003cdiv style=\"display: flex; gap: 16px; align-items: flex-start;\"\u003e\n            \u003cdiv style=\"font-size: 24px; font-weight: 700; color: #3B6ADD; flex-shrink: 0; line-height: 1;\"\u003eI\u003c/div\u003e\n            \u003cdiv\u003e\n              \u003cdiv style=\"font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 6px;\"\u003eLe civiche collegate contano di più delle autonome\u003c/div\u003e\n              \u003cdiv style=\"font-size: 13px; color: #8AABDA; line-height: 1.6;\"\u003eLe civiche collegate mostrano la correlazione più forte (r = +0,568, β = +0,286 in OLS). Le autonome: r = +0,193, non significativo. Il panel FE conferma la direzione (β = +0,717). Il canale di mobilitazione più efficace è quello ibrido civismo+partito.\u003c/div\u003e\n            \u003c/div\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n\n        \u003c!-- Parte II --\u003e\n        \u003cdiv style=\"background: rgba(255,255,255,0.06); border-radius: 10px; padding: 18px 22px; border-left: 3px solid #EC6B5D;\"\u003e\n          \u003cdiv style=\"display: flex; gap: 16px; align-items: flex-start;\"\u003e\n            \u003cdiv style=\"font-size: 24px; font-weight: 700; color: #EC6B5D; flex-shrink: 0; line-height: 1;\"\u003eII\u003c/div\u003e\n            \u003cdiv\u003e\n              \u003cdiv style=\"font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 6px;\"\u003ePiù candidati non significa più partecipazione\u003c/div\u003e\n              \u003cdiv style=\"font-size: 13px; color: #8AABDA; line-height: 1.6;\"\u003eSul campione pieno non-EU: β = −0,386 (t = −2,08). Nel panel FE: effetto nullo (t = +0,87). Il numero di candidature è un indicatore troppo grezzo — cattura frammentazione, non pluralismo reale. Ferrara con 4 candidati si colloca nella fascia mediana: il numero non spiega la sua alta partecipazione.\u003c/div\u003e\n            \u003c/div\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n\n        \u003c!-- Parte III --\u003e\n        \u003cdiv style=\"background: rgba(255,255,255,0.06); border-radius: 10px; padding: 18px 22px; border-left: 3px solid #F4B740;\"\u003e\n          \u003cdiv style=\"display: flex; gap: 16px; align-items: flex-start;\"\u003e\n            \u003cdiv style=\"font-size: 24px; font-weight: 700; color: #F4B740; flex-shrink: 0; line-height: 1;\"\u003eIII\u003c/div\u003e\n            \u003cdiv\u003e\n              \u003cdiv style=\"font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 6px;\"\u003eLa densità dell\u0027offerta civica è il predittore più forte\u003c/div\u003e\n              \u003cdiv style=\"font-size: 13px; color: #8AABDA; line-height: 1.6;\"\u003eIl rapporto civiche/candidato ha β = +2,097 (t = +4,93) in OLS — quasi 10× superiore al volume grezzo (β = +0,225). Non quante liste esistono, ma quante reti ogni candidatura riesce ad attivare. Ferrara: densità 1,5, contributo stimato +3,1 pp. Spazio di crescita reale.\u003c/div\u003e\n            \u003c/div\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n\n      \u003c!-- Ferrara summary --\u003e\n      \u003cdiv style=\"margin-top: 24px; background: rgba(30,90,232,0.2); border-radius: 10px; padding: 16px 20px; border: 1px solid rgba(30,90,232,0.35);\"\u003e\n        \u003cdiv style=\"font-size: 12px; font-weight: 600; color: #7097EC; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px;\"\u003eSul caso Ferrara specificatamente\u003c/div\u003e\n        \u003cdiv style=\"font-size: 13px; color: #B8CCF6; line-height: 1.65;\"\u003eL\u0027alta partecipazione del 2024 (67,6%, 2° posto nel gruppo) è spiegata da una combinazione: contributo delle civiche collegate (+1,7–2,0 pp), tradizione partecipativa emiliana, e competitività percepita della sfida. Le liste civiche sono una risorsa reale ma non l\u0027unica spiegazione — il loro potenziamento, in densità più che in volume, rimane la leva più praticabile per tornate future.\u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n\n    \u003c!-- ─── FOOTER ─── --\u003e\n    \u003cdiv style=\"border-top: 1px solid var(--bd); padding-top: 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;\"\u003e\n      \u003cimg src=\"edb2324b-9344-4a92-991d-4251b1d18f57\" style=\"height: 28px; width: auto; display: block; object-fit: contain; object-position: left center;\"\u003e\n      \u003cdiv style=\"font-size: 11px; color: var(--muted2); text-align: right; line-height: 1.5;\"\u003eAnalisi dataset ministeriale 2021–2025 · Giugno 2026\u003cbr\u003eFonti: Ministero dell\u0027Interno · Classificazione: tassonomia LCF (Zonari, 2024)\u003c/div\u003e\n    \u003c/div\u003e\n\n    \u003c/td\u003e\u003c/tr\u003e\u003c/tbody\u003e\n    \u003ctfoot\u003e\u003ctr\u003e\u003ctd class=\"ftr-space\"\u003e\u003c/td\u003e\u003c/tr\u003e\u003c/tfoot\u003e\n  \u003c/table\u003e\n\u003c/main\u003e\n\n\u003c/x-dc\u003e\n\n\n\n\u003cscript\u003e\n(function () {\n  function fix() {\n    if (window.innerWidth \u003e 680) return;\n    var h1 = document.querySelector(\u0027.cover h1\u0027);\n    if (h1) h1.style.fontSize = \u002730px\u0027;\n    var coverSub = document.querySelector(\u0027.cover p\u0027);\n    if (coverSub) coverSub.style.fontSize = \u002717px\u0027;\n    document.querySelectorAll(\u0027[style]\u0027).forEach(function (el) {\n      var s = el.style.gridTemplateColumns;\n      if (!s) return;\n      if (s.indexOf(\u0027repeat(4\u0027) !== -1) el.style.gridTemplateColumns = \u0027repeat(2, 1fr)\u0027;\n      else if (s.indexOf(\u0027repeat(3\u0027) !== -1) el.style.gridTemplateColumns = \u00271fr\u0027;\n      else if (s === \u00271fr 1fr\u0027) el.style.gridTemplateColumns = \u00271fr\u0027;\n    });\n    document.querySelectorAll(\u0027[style*=\"display: flex\"][style*=\"justify-content: center\"]\u0027).forEach(function (el) {\n      el.style.flexWrap = \u0027wrap\u0027;\n    });\n  }\n  if (document.readyState === \u0027loading\u0027) document.addEventListener(\u0027DOMContentLoaded\u0027, fix);\n  else fix();\n  window.addEventListener(\u0027resize\u0027, fix);\n})();\n\u003c/script\u003e\n\u003c/body\u003e\u003c/html\u003e"
